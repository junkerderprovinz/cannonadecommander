name: Build

# Runs the unit tests, packages the plugin .txz, and BOOTS the supervisor binary
# on the runner (curling its unix socket) before trusting a build. A green
# compile only proves it builds; this proves it starts and serves.
on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - "docs/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Unit tests
        run: go test ./...

      - name: Package plugin (.txz + sha)
        run: bash plugin/pkg_build.sh 0.0.0-ci

      - name: Boot smoke — supervisor serves its socket
        run: |
          set -euo pipefail
          BIN=plugin/src/cannonadecommand/usr/local/emhttp/plugins/cannonadecommand/bin/cannonadecommand
          echo "version: $("$BIN" version)"
          CC_SOCK=/tmp/cc.sock CC_DATA_DIR=/tmp/ccdata CC_DOCKER_SOCK=/tmp/nope.sock "$BIN" serve &
          PID=$!
          for _ in $(seq 1 20); do [ -S /tmp/cc.sock ] && break; sleep 0.5; done
          if ! curl -fsS --unix-socket /tmp/cc.sock http://localhost/api/health | grep -q ok; then
            echo "health check failed"; kill "$PID" || true; exit 1
          fi
          # /api/state must still respond (with a docker_error, since the socket is bogus).
          curl -fsS --unix-socket /tmp/cc.sock http://localhost/api/state | grep -q docker_error
          echo "✅ supervisor booted and served /api/health + /api/state"
          kill "$PID" || true

      # END-TO-END limits proof against a REAL dockerd (the runner ships docker): the
      # daemon must set, raise and REMOVE CPU/RAM caps on real containers — including
      # the "Extra Parameters" cases (--memory with its auto swap cap, --cpu-quota) that
      # broke on the box. If this is green, the daemon→docker chain provably works.
      - name: Limits integration — real docker
        run: |
          set -euo pipefail
          BIN=plugin/src/cannonadecommand/usr/local/emhttp/plugins/cannonadecommand/bin/cannonadecommand
          CC_SOCK=/tmp/cc-int.sock CC_DATA_DIR=/tmp/ccdata-int "$BIN" serve &
          for _ in $(seq 1 20); do [ -S /tmp/cc-int.sock ] && break; sleep 0.5; done
          CURL="curl -fsS --unix-socket /tmp/cc-int.sock"
          docker run -d --name cc_mem --memory 1g busybox sleep 300
          docker run -d --name cc_quota --cpu-quota 150000 --cpu-period 100000 busybox sleep 300
          docker run -d --name cc_plain busybox sleep 300
          # RAM: raise past the stored auto swap cap (2G > 2×1G? no — use 4G to be sure)
          $CURL -X POST -d '{"name":"cc_mem","mem_bytes":4294967296}' http://localhost/api/limits
          [ "$(docker inspect -f '{{.HostConfig.Memory}}' cc_mem)" = "4294967296" ] || { echo "RAM raise FAILED"; exit 1; }
          # RAM: remove (engine sets host RAM) — must exceed any stored swap cap
          $CURL -X POST -d '{"name":"cc_mem","remove_mem":true}' http://localhost/api/limits
          M=$(docker inspect -f '{{.HostConfig.Memory}}' cc_mem); [ "$M" -gt 4294967296 ] || { echo "RAM remove FAILED (Memory=$M)"; exit 1; }
          # CPU on a quota-family container → expressed as quota = cpus × period
          $CURL -X POST -d '{"name":"cc_quota","nano_cpus":2500000000}' http://localhost/api/limits
          [ "$(docker inspect -f '{{.HostConfig.CpuQuota}}' cc_quota)" = "250000" ] || { echo "CPU quota-family FAILED"; exit 1; }
          # CPU + cpuset on a plain container → NanoCpus + pinning
          $CURL -X POST -d '{"name":"cc_plain","nano_cpus":1500000000,"cpuset_cpus":"0-1"}' http://localhost/api/limits
          [ "$(docker inspect -f '{{.HostConfig.NanoCpus}}' cc_plain)" = "1500000000" ] || { echo "CPU NanoCpus FAILED"; exit 1; }
          [ "$(docker inspect -f '{{.HostConfig.CpusetCpus}}' cc_plain)" = "0-1" ] || { echo "cpuset FAILED"; exit 1; }
          # first-time RAM cap on a NEVER-capped container (stored swap 0 — the raw-compare trap)
          $CURL -X POST -d '{"name":"cc_plain","mem_bytes":2147483648}' http://localhost/api/limits
          [ "$(docker inspect -f '{{.HostConfig.Memory}}' cc_plain)" = "2147483648" ] || { echo "first RAM cap FAILED"; exit 1; }
          echo "✅ limits set/raise/remove PROVEN against real dockerd"

      - name: Download policing — real netns (netfilter only, no qdisc)
        run: |
          set -e
          CID=$(docker run -d --rm alpine:3 sleep 120)
          PID=$(docker inspect -f '{{.State.Pid}}' "$CID")
          sudo nsenter -t "$PID" -n iptables -w -N CC_DL
          sudo nsenter -t "$PID" -n iptables -w -A CC_DL -m hashlimit --hashlimit-above 5000000b/s --hashlimit-burst 10000000b --hashlimit-name ccdl -j DROP
          sudo nsenter -t "$PID" -n iptables -w -I INPUT -i eth0 -j CC_DL
          sudo nsenter -t "$PID" -n iptables -w -S CC_DL | grep -q hashlimit
          sudo nsenter -t "$PID" -n iptables -w -S INPUT | grep -q CC_DL
          sudo nsenter -t "$PID" -n iptables -w -D INPUT -i eth0 -j CC_DL
          sudo nsenter -t "$PID" -n iptables -w -F CC_DL
          sudo nsenter -t "$PID" -n iptables -w -X CC_DL
          docker rm -f "$CID"
          echo "✅ download policing (hashlimit in a container netns) PROVEN against a real kernel"

      - name: Download policing — throughput measurement
        run: |
          set -e
          mkdir -p /tmp/ccserve && head -c 8000000 /dev/urandom > /tmp/ccserve/blob
          (cd /tmp/ccserve && python3 -m http.server 8099 >/dev/null 2>&1 &)
          sleep 1
          CID=$(docker run -d --rm alpine:3 sleep 300)
          PID=$(docker inspect -f '{{.State.Pid}}' "$CID")
          HOSTIP=$(docker network inspect bridge -f '{{(index .IPAM.Config 0).Gateway}}')
          docker exec "$CID" wget -q -O /dev/null "http://$HOSTIP:8099/blob"
          sudo nsenter -t "$PID" -n iptables -w -N CC_DL
          sudo nsenter -t "$PID" -n iptables -w -A CC_DL -m hashlimit --hashlimit-above 250000b/s --hashlimit-burst 500000b --hashlimit-name ccdl -j DROP
          sudo nsenter -t "$PID" -n iptables -w -I INPUT -i eth0 -j CC_DL
          T0=$(date +%s%N)
          docker exec "$CID" timeout 120 wget -q -O /dev/null "http://$HOSTIP:8099/blob"
          T1=$(date +%s%N)
          MS=$(( (T1 - T0) / 1000000 ))
          RATE=$(( 8000000 * 1000 / MS ))
          echo "cap 250000 B/s → measured ${RATE} B/s over ${MS}ms"
          if [ "$RATE" -gt 400000 ]; then echo "::error::limit NOT enforced (>160% of cap)"; exit 1; fi
          if [ "$RATE" -lt 75000 ]; then echo "::warning::throughput collapsed below 30% of cap (policing quality)"; fi
          docker rm -f "$CID"
          echo "✅ download policing THROUGHPUT measured: ${RATE} B/s at a 250000 B/s cap"

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: cannonadecommand-txz
          path: plugin/out/*.txz
