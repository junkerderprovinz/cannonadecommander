name: Lint

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "gofmt needs to be run on:"; echo "$unformatted"; exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        # Build golangci-lint v2 from source with the runner's Go so its build-Go
        # is never older than the module's target (the action's prebuilt binary
        # was built with an older Go and refused a go 1.26 module).
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
          "$(go env GOPATH)/bin/golangci-lint" run ./...

      # The WebGUI half is plain browser JS with no bundler, so it gets the gate the Go half already has:
      # a syntax check on every script, plus DOM-shim tests that replay the markup Unraid really renders.
      # Every bug here that has cost us a release came from ASSUMING a DOM shape instead of pinning it.
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
      - name: js syntax
        run: find plugin/src -name '*.js' -print0 | xargs -0 -r -n1 node --check
      - name: js dom tests
        run: |
          for t in plugin/test/*.test.js; do echo "== $t"; node "$t" || exit 1; done
